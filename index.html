<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomad Dawn</title>
    <!-- Modular CSS: base + ui split from original monolith -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/ui.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/noisejs@2.1.0/index.min.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="loading-screen">
                <h1>Nomad Dawn</h1>
                <div class="loading-bar">
                    <div class="loading-progress"></div>
                </div>
                <p>Loading the wastes...</p>
            </div>
            <div id="hud" class="hidden">
                <div id="player-stats-top-left">
                    <div class="stat-item" id="hud-health">Health: 100/100</div>
                    <div class="stat-item" id="hud-position">Position: (0, 0)</div>
                    <!-- Add more stats as needed -->
                </div>
                <div id="resource-display-top-right">
                    <h3>Resources</h3>
                    <div id="hud-resources">
                        <!-- Resource items will be populated here -->
                        <div class="resource-item">Metal: 0</div>
                        <div class="resource-item">Energy: 0</div>
                        <div class="resource-item">Food: 0</div>
                    </div>
                </div>
                <div id="minimap-container">
                     <div id="minimap"></div>
                </div>
                <div id="controls-info-bottom-left" class="hidden">
                    <h3>Controls</h3>
                    <ul>
                        <li>[WASD] / [Arrows]: Move</li>
                        <li>[Mouse]: Aim</li>
                        <li>[I]: Inventory</li>
                        <li>[B]: Build Menu (Near Vehicle)</li>
                        <li>[Esc]: Menu / Close UI</li>
                        <li>[Ctrl + `]: Toggle Debug</li>
                    </ul>
                </div>
                <div id="hud-buttons-bottom-right">
                     <button class="hud-button" id="toggle-controls">Controls</button>
                     <button class="hud-button" id="toggle-debug">Debug</button>
                     <button class="hud-button" id="game-menu-button">Menu</button>
                </div>
            </div>
             <div id="game-menu" class="hidden">
                 <h2>Game Menu</h2>
                 <button id="resume-game">Resume</button>
                 <button id="menu-settings">Settings</button>
                 <button id="menu-quit">Quit Game</button>
                 <div class="menu-content">
                     <!-- Settings or other content could go here -->
                 </div>
             </div>
            <div id="debug-overlay" class="hidden"></div>
             <!-- Inventory UI Container -->
             <div id="inventory-ui" class="game-ui hidden"></div>
             <!-- Building UI Container -->
             <div id="building-ui" class="game-ui hidden"></div>
             <!-- Notifications Container -->
             <div id="notifications-container"></div>
        </div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
